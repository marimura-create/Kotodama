<!DOCTYPE html>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;600&display=swap');
        
        body {
            background-color: #0a0c14;
            color: #d4c8a8;
            font-family: 'Noto Serif JP', 'Cinzel', serif;
            overflow-x: hidden;
        }
        .text-brass { color: #d4c8a8; }
        .bg-dark-void { background-color: #0a0c14; }
        .border-brass { border-color: rgba(212, 200, 168, 0.3); }
        
        /* メビウスの輪による世界反転エフェクト */
        .mebius-invert {
            filter: invert(0.9) hue-rotate(180deg);
            background-color: #d4c8a8 !important;
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 創世記プロローグ用のフェードイン・アウト */
        .line-fade {
            animation: fadeInOut 4s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
            15% { opacity: 1; transform: translateY(0); filter: blur(0); }
            85% { opacity: 1; transform: translateY(0); filter: blur(0); }
            100% { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
        }
    </style>
</head>

        const PROLOGUE_LINES = [
            "世界は無だった",
            "感じることを知らない世界は、自他の境界も概念すらなかった",

            "世界は光に溢れていた──"
        ];

        // --- 形霊SVG形状描画コンポーネント ---
        function ShapeIcon({ type, color, className = "" }) {
            const props = { stroke: color, strokeWidth: "1.5", fill: "none", className: `w-6 h-6 ${className}` };
            switch (type) {
                case 'a': return <svg viewBox="0 0 24 24" {...props}><circle cx="12" cy="12" r="9" /></svg>;
                case 'i': return <svg viewBox="0 0 24 24" {...props}><polygon points="12,3 21,19 3,19" /></svg>;
                case 'u': return <svg viewBox="0 0 24 24" {...props}><path d="M12,3 C17,3 21,7 21,12 C21,17 14,21 12,15 C10,9 15,7 12,11" /></svg>;
                case 'e': return <svg viewBox="0 0 24 24" {...props}><polygon points="12,2 20,7 20,17 12,22 4,17 4,7" /></svg>;
                case 'o': return <svg viewBox="0 0 24 24" {...props}><rect x="4" y="4" width="16" height="16" rx="1" /></svg>;
                default: return <svg viewBox="0 0 24 24" {...props}><circle cx="12" cy="12" r="2" fill={color} /></svg>;
            }
        }

        // --- メインアプリケーション ---
        function App() {
            const [prologueIndex, setPrologueIndex] = useState(-1);
            const [activeTab, setActiveTab] = useState('simulator'); // 'simulator' | 'kotowari'
            const [showReion, setShowReion] = useState(false);
            const [showModulator, setShowModulator] = useState(false);
            const [hoveredCell, setHoveredCell] = useState(null);
            const [stack, setStack] = useState([]);

            // 初回起動時演出の判定
            useEffect(() => {
                const hasSeen = localStorage.getItem('kotodama_prologue_seen');
                if (!hasSeen) {
                    setPrologueIndex(0);
                }
            }, []);

            // プロローグ送り制御
            useEffect(() => {
                if (prologueIndex >= 0 && prologueIndex < PROLOGUE_LINES.length) {
                    const timer = setTimeout(() => {
                        setPrologueIndex(prev => prev + 1);
                    }, 4000);
                    return () => clearTimeout(timer);
                } else if (prologueIndex === PROLOGUE_LINES.length) {
                    endPrologue();
                }
            }, [prologueIndex]);

            const endPrologue = () => {
                localStorage.setItem('kotodama_prologue_seen', 'true');
                setPrologueIndex(-1);
            };

            const triggerResetPrologue = () => {
                setPrologueIndex(0);
            };

            // スタック操作
            const addToStack = (char) => {
                const moyin = MOYINS.find(m => char.includes(m.name)) || { key: 'none', color: '#d4c8a8' };
                const shiin = SHIINS.find(s => {
                    if (s.key === '-') return false;
                    const row = MATRIX_DATA[s.key];
                    return Object.values(row).includes(char);
                }) || { key: '-', dist: '', anim: '' };

                const num = KAZUTAMA_MAP[char] || 0;
                setStack(prev => [...prev, { id: Date.now() + Math.random(), char, num, moyin, shiin }]);
            };

            const removeFromStack = (id) => {
                setStack(prev => prev.filter(item => item.id !== id));
            };

            const clearStack = () => setStack([]);

            // --- 特殊波動力学・数理計算 ---
            const isMebius = stack.some(item => item.char === 'わ');
            
            let totalKazutama = 0;
            let displayCalcul = [];
            
            for (let i = 0; i < stack.length; i++) {
                const current = stack[i];
                if (current.char === 'っ') {
                    if (i + 1 < stack.length && stack[i+1].num > 0) {
                        const next = stack[i+1];
                        totalKazutama += next.num * 2;
                        displayCalcul.push(`(2 × ${next.num})`);
                        i++; // 次の音を圧縮倍加として処理跨ぎ
                    } else {
                        displayCalcul.push("0");
                    }
                } else {
                    if (current.num > 0) {
                        totalKazutama += current.num;
                        displayCalcul.push(`${current.num}`);
                    } else if (current.char === 'ん') {
                        displayCalcul.push("0");
                    }
                }
            }

            if (isMebius) {
                totalKazutama = -totalKazutama;
            }

            // 主色霊の決定（スタック内の優位な色、なければ真鍮色）
            const mainColor = stack.length > 0 ? stack[stack.length - 1].moyin.color : '#d4c8a8';

            // プロローグ画面のレンダリング
            if (prologueIndex >= 0 && prologueIndex < PROLOGUE_LINES.length) {
                return (
                    <div className="fixed inset-0 bg-black flex flex-col justify-center items-center z-50 p-6 select-none">
                        <div key={prologueIndex} className="line-fade text-center text-xl md:text-2xl font-light tracking-widest max-w-3xl leading-loose text-brass">
                            {PROLOGUE_LINES[prologueIndex]}
                        </div>
                        <button 
                            onClick={endPrologue} 
                            className="absolute bottom-10 right-10 text-xs tracking-widest opacity-40 hover:opacity-100 border border-brass px-4 py-2 transition-all"
                        >
                            目を開ける（SKIP）
                        </button>
                    </div>
                );
            }

            // メイン画面のレンダリング
            return (
                <div className={`min-h-screen transition-all duration-1000 p-4 md:p-8 flex flex-col justify-between ${isMebius ? 'mebius-invert' : ''}`}>
                    
                    {/* ヘッダーエリア */}
                    <header className="flex flex-col md:flex-row justify-between items-center border-b border-brass pb-4 mb-6">
                        <div>
                            <h1 className="text-2xl font-bold tracking-widest font-serif text-brass flex items-center gap-3">
                                言霊波動ジェネレーター <span className="text-xs border px-2 py-0.5 opacity-60">V3 COMPLETE</span>
                            </h1>
                            <p className="text-xs opacity-60 mt-1">理（論理マトリクス）と情動（直感の波動）の共存器</p>
                        </div>
                        
                        {/* タブ切り替え ＆ 外部リンク */}
                        <div className="flex items-center gap-4 mt-4 md:mt-0 text-sm">
                            <button 
                                onClick={() => setActiveTab('simulator')} 
                                className={`px-4 py-2 tracking-widest transition-all ${activeTab === 'simulator' ? 'border-b-2 border-brass font-bold text-brass' : 'opacity-50'}`}
                            >
                                言霊錬金術
                            </button>
                            <button 
                                onClick={() => setActiveTab('kotowari')} 
                                className={`px-4 py-2 tracking-widest transition-all ${activeTab === 'kotowari' ? 'border-b-2 border-brass font-bold text-brass' : 'opacity-50'}`}
                            >
                                言霊の理
                            </button>
                            <a 
                                href="story.html" 
                                className="opacity-60 hover:opacity-100 transition-all text-xs border border-brass px-3 py-1.5 rounded bg-amber-950/20"
                            >
                                聖典『世界の成り立ち』を紐解く →
                            </a>
                        </div>
                    </header>

                    {/* メインコンテンツ */}
                    <main className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start flex-grow">
                        
                        {/* 左・中央：盤面エリア */}
                        <div className="lg:col-span-2 space-y-4">
                            {activeTab === 'simulator' ? (
                                <div className="border border-brass p-4 rounded bg-black/40 backdrop-blur">
                                    <div className="flex justify-between items-center mb-3 text-xs opacity-70">
                                        <span>鍵盤を叩き、言葉をスタックに送り込みなさい</span>
                                        <div className="flex gap-4">
                                            <button onClick={() => setShowReion(!showReion)} className="underline hover:text-brass">
                                                {showReion ? '深層霊音を隠す' : '深層霊音を覗く'}
                                            </button>
                                            <button onClick={() => setShowModulator(!showModulator)} className="underline hover:text-brass">
                                                {showModulator ? '変調器を隠す' : '変調器を開く'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* 五十音グリッドマトリクス */}
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-center border-collapse text-xs md:text-sm">
                                            <thead>
                                                <tr className="border-b border-brass/20">
                                                    <th className="p-2 font-normal opacity-50 text-left">子音＼母音</th>
                                                    {MOYINS.map(m => (
                                                        <th key={m.key} className="p-2 font-normal" style={{ color: m.color }}>
                                                            <div className="flex flex-col items-center gap-0.5">
                                                                <span className="text-base font-bold">{m.name}</span>
                                                                <span className="text-[10px] opacity-60 scale-90">{m.attr}</span>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {SHIINS.map(s => (
                                                    <tr key={s.key} className="border-b border-brass/10 hover:bg-white/5 transition-all">
                                                        <td className="p-2 text-left opacity-70 font-serif border-r border-brass/10">
                                                            <span className="font-bold text-brass mr-1">{s.name}</span>
                                                            <span className="text-[10px] opacity-50">[{s.label}]</span>
                                                        </td>
                                                        {MOYINS.map(m => {
                                                            const char = MATRIX_DATA[s.key][m.key];
                                                            const isReion = REION_LIST.includes(char);
                                                            const hasNum = KAZUTAMA_MAP[char];
                                                            
                                                            if (isReion && !showReion) return <td key={m.key} className="p-2 opacity-10 font-mono">-</td>;

                                                            return (
                                                                <td 
                                                                    key={m.key}
                                                                    onClick={() => addToStack(char)}
                                                                    onMouseEnter={() => setHoveredCell({ char, moyin: m, shiin: s })}
                                                                    onMouseLeave={() => setHoveredCell(null)}
                                                                    className={`p-3 cursor-pointer transition-all relative font-medium group hover:scale-105`}
                                                                    style={{ 
                                                                        color: isReion ? undefined : m.color,
                                                                        opacity: isReion && !isMebius ? 0.35 : 1
                                                                    }}
                                                                >
                                                                    <div className="flex flex-col items-center justify-center min-h-[32px]">
                                                                        <span className="text-base tracking-wide font-bold group-hover:text-white transition-colors">{char}</span>
                                                                        {hasNum && (
                                                                            <span className="text-[9px] bg-amber-900/40 text-brass px-1 rounded border border-brass/30 scale-75 mt-0.5">
                                                                                {hasNum}
                                                                            </span>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    {/* マトリクス外独立：無極「ん」 */}
                                    <div className="mt-4 pt-4 border-t border-brass/20 grid grid-cols-2 gap-4">
                                        <div 
                                            onClick={() => addToStack('ん')}
                                            onMouseEnter={() => setHoveredCell({ char: 'ん', moyin: { name: '凪', attr: '無極', color: '#fff' }, shiin: { label: '虚無', dist: 'すべての波長が凪となり、原初の静寂へと収束する音。', anim: '' } })}
                                            onMouseLeave={() => setHoveredCell(null)}
                                            className="border border-dashed border-brass/40 p-3 rounded text-center cursor-pointer hover:bg-white/5 transition-all"
                                        >
                                            <span className="text-xs opacity-50 block mb-1">五十音の終着点 / 零</span>
                                            <span className="text-xl font-bold text-white">ん <span className="text-xs bg-gray-700 px-1 rounded ml-1">【〇】</span></span>
                                        </div>

                                        <div className="text-xs opacity-60 flex items-center justify-center text-center">
                                            メビウスの輪（わ）を混ぜることで、世界は潜象の反転を起こす。
                                        </div>
                                    </div>

                                    {/* アコーディオン：変調器モジュレーター */}
                                    {showModulator && (
                                        <div className="mt-4 p-3 border border-brass/30 rounded bg-amber-950/10 animate-fadeIn">
                                            <h4 className="text-xs text-brass mb-2 tracking-widest">変化律変調器（モジュレーター）</h4>
                                            <div className="flex gap-2">
                                                {['っ', 'ゃ', 'ゅ', 'ょ'].map(mod => (
                                                    <button 
                                                        key={mod}
                                                        onClick={() => addToStack(mod)}
                                                        className="px-4 py-2 border border-brass/40 rounded hover:bg-white/10 text-white font-bold transition-all"
                                                    >
                                                        {mod}
                                                    </button>
                                                ))}
                                            </div>
                                            <p className="text-[10px] opacity-50 mt-1">※っ：次音の数霊を2倍に圧搾 / ゃゅょ：い段に滑り込み高次元シフトを誘発</p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                /* タブ2：言霊の理（一覧読解） */
                                <div className="border border-brass p-6 rounded bg-black/60 space-y-6 max-h-[70vh] overflow-y-auto font-serif">
                                    <h3 className="text-lg text-brass border-b border-brass/30 pb-2">言霊対応解説盤（一部抜粋）</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs leading-relaxed">
                                        <div>
                                            <h4 className="font-bold text-red-400 mb-1">【あか】 明るい色</h4>
                                            <p className="opacity-75">あ（虚空）＋ か（開闢）＝ 空間が開き、光が満ちた状態。光の全開。</p>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-gray-400 mb-1">【くろ】 暗い色</h4>
                                            <p className="opacity-75">く（陽炎）＋ ろ（流砂）＝ 光が風に揺らぎ、土の混沌へ沈む。光の不在。</p>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-emerald-400 mb-1">【みどり】 植物・緑色</h4>
                                            <p className="opacity-75">み（原初）【三】＋ ど（定着）＋ り（流転）＝ 大枠の自然に命が根を下ろし、猛烈な熱の循環を始めた様。</p>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-yellow-500 mb-1">【かみ】 神・光の源流</h4>
                                            <p className="opacity-75">か（開闢の光）＋ み（原初の生命降臨）【三】＝ 光が原初の虚無に生命の熱を灯した、すべての始まりたる超常存在。</p>
                                        </div>
                                    </div>
                                    <div className="border-t border-brass/20 pt-4 text-xs opacity-60">
                                        より包括的な神話の全貌、および「結合言霊辞書（単語定義）」は、外部書庫の <a href="story.html" className="underline text-brass font-bold">story.html</a> に美しく格納されています。
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 右側：リアルタイム詳細・解説パネル */}
                        <div className="space-y-4">
                            <div className="border border-brass p-4 rounded bg-zinc-900/80 min-h-[220px] flex flex-col justify-between">
                                <div>
                                    <h3 className="text-xs text-brass opacity-60 tracking-widest uppercase mb-2">霊音波動解析パネル</h3>
                                    {hoveredCell ? (
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-baseline">
                                                <span className="text-3xl font-bold text-white">{hoveredCell.char}</span>
                                                <span className="text-xs px-2 py-0.5 rounded" style={{ backgroundColor: hoveredCell.moyin.bg, color: hoveredCell.moyin.color }}>
                                                    {hoveredCell.moyin.attr}
                                                </span>
                                            </div>
                                            <div className="text-xs border-l-2 pl-2 border-brass/40 italic opacity-80">
                                                指向変調：{hoveredCell.shiin.dist}
                                            </div>
                                            <p className="text-xs text-brass/90 leading-relaxed pt-2">
                                                {CELL_DETAILS[hoveredCell.char] || 'この音の深層は、世界の余白に溶けています。'}
                                            </p>
                                            <div className="flex justify-center pt-2">
                                                <ShapeIcon type={hoveredCell.moyin.key} color={hoveredCell.moyin.color} className={hoveredCell.shiin.anim} />
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-xs opacity-40 text-center py-12 italic">
                                            盤面の音に触れなさい。<br/>その波長の構成がここに映し出されます。
                                        </div>
                                    )}
                                </div>
                                <div className="text-[10px] opacity-40 border-t border-brass/10 pt-2 text-right">
                                    波長干渉率: 100%
                                </div>
                            </div>
                            
                            {/* 儀式の再演 */}
                            <div className="text-center">
                                <button 
                                    onClick={triggerResetPrologue} 
                                    className="text-[10px] tracking-widest opacity-30 hover:opacity-100 transition-all underline"
                                >
                                    ── 創世の記憶（プロローグ演出）を呼び覚ます
                                </button>
                            </div>
                        </div>
                    </main>

                    {/* 下部固定：言霊錬金術（数霊シミュレーター・スタックエリア） */}
                    <footer className="mt-8 border-t border-brass/40 pt-4 bg-black/60 p-4 rounded-t-lg backdrop-blur-md">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="text-xs tracking-widest font-bold text-brass uppercase flex items-center gap-2">
                                <span>言霊編纂スロット（錬金術領域）</span>
                                {isMebius && <span className="text-[10px] bg-red-950 text-red-200 px-2 py-0.5 animate-pulse rounded border border-red-700">MEBIUS REVERSE</span>}
                            </h3>
                            {stack.length > 0 && (
                                <button onClick={clearStack} className="text-xs opacity-50 hover:opacity-100 text-red-400 underline transition-all">
                                    スロットを虚無へ還す
                                </button>
                            )}
                        </div>

                        {/* 編まれた言葉のスタックバッジ表示 */}
                        <div className="min-h-[50px] flex flex-wrap gap-2 items-center p-2 bg-zinc-950/80 rounded border border-brass/20">
                            {stack.length === 0 ? (
                                <span className="text-xs opacity-30 italic pl-2">言葉がまだ紡がれていません。上の盤面をクリックして音を調合してください。</span>
                            ) : (
                                stack.map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => removeFromStack(item.id)}
                                        className="flex items-center gap-1 text-sm font-bold border rounded px-2.5 py-1 cursor-pointer hover:bg-red-900/30 hover:border-red-500 transition-all select-none animate-scaleIn group"
                                        style={{ borderColor: item.moyin.color, backgroundColor: item.moyin.bg }}
                                    >
                                        <span style={{ color: item.moyin.color }}>{item.char}</span>
                                        <span className="text-[9px] opacity-40 group-hover:hidden">{item.num > 0 ? item.num : ''}</span>
                                        <span className="text-[9px] text-red-400 hidden group-hover:inline">×</span>
                                    </div>
                                ))
                            )}
                        </div>

                        {/* 波動測定結果（数理と波長の出力） */}
                        {stack.length > 0 && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-3 text-xs border-t border-brass/10 pt-3 animate-fadeIn">
                                <div className="p-2 bg-white/5 rounded">
                                    <span className="opacity-50 block mb-0.5">合計数霊（数の方程式）</span>
                                    <div className="text-lg font-bold text-white tracking-wider">
                                        {totalKazutama} 
                                        <span className="text-xs opacity-50 font-normal ml-2">
                                            = {isMebius ? '-(' : ''}{displayCalcul.join(' + ')}{isMebius ? ')' : ''}
                                        </span>
                                    </div>
                                </div>
                                <div className="p-2 bg-white/5 rounded">
                                    <span className="opacity-50 block mb-0.5">主たる色霊（光の優位性）</span>
                                    <div className="text-sm font-bold flex items-center gap-2" style={{ color: mainColor }}>
                                        <span className="w-3 h-3 rounded-full border border-white/20" style={{ backgroundColor: mainColor }}></span>
                                        {stack[stack.length - 1].moyin.attr || '未確定'} の残響
                                    </div>
                                </div>
                                <div className="p-2 bg-white/5 rounded">
                                    <span className="opacity-50 block mb-0.5">形霊の連鎖（幾何学の干渉波）</span>
                                    <div className="flex gap-1.5 items-center pt-0.5">
                                        {stack.map((item, idx) => (
                                            <div key={idx} title={`${item.char}: ${item.shiin.dist}`}>
                                                <ShapeIcon type={item.moyin.key} color={item.moyin.color} className={`w-5 h-5 ${item.shiin.anim}`} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </footer>

                </div>
            );
        }

        // レンダー起動
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
